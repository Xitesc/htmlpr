<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio UI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="avatar">
        <img src="assest/profile.png" alt="Profile">
      </div>

      <div class="info">
        <h1>Mr. PONGKEIT HANKLANG</h1>
        <h2>System Analysis & Developer</h2>
        <button id="openResume" class="resume-btn">View Resume</button>
      </div>
    </div>

    <!-- NAVBAR -->
    <div class="tabs">
      <button class="tab active" data-target="skills">Skills</button>
      <button class="tab" data-target="education">Education</button>
      <button class="tab" data-target="experience">Experience</button>
      <button class="tab" data-target="projects">Projects</button>
    </div>

    <!-- SECTIONS -->
    <div id="skills" class="section active">
      <h3>Skills</h3>
      <ul>
        <li>HTML, CSS, JavaScript</li>
        <li>Flutter, Firebase</li>
        <li>ESP8266 / IoT Development</li>
      </ul>
    </div>

    <div id="education" class="section">
      <h3>Education</h3>
      <p>Your university / school here</p>
    </div>

    <div id="experience" class="section">
      <h3>Experience</h3>
      <p>Your work experience here</p>
    </div>

    <div id="projects" class="section">
      <h3>Projects</h3>
      <p>Your projects here</p>
    </div>

  </div>

  <!-- RESUME MODAL -->
  <div id="resumeModal" class="modal">
    <div class="modal-content">

      <span class="close">&times;</span>

      <img src="assest/maresume.png" class="resume-img" alt="Resume">

      <a href="pdf/resume.pdf" download class="download-btn">
        Download PDF
      </a>

    </div>
  </div>

  <!-- JS -->
  <script>
    // Tabs
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('.section');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById(tab.dataset.target).classList.add('active');
      });
    });

    // Resume Modal
    const modal = document.getElementById("resumeModal");
    const openBtn = document.getElementById("openResume");
    const closeBtn = document.querySelector(".close");

    openBtn.onclick = () => {
      modal.style.display = "block";
    };

    closeBtn.onclick = () => {
      modal.style.display = "none";
    };

    window.onclick = (e) => {
      if (e.target == modal) {
        modal.style.display = "none";
      }
    };
  </script>

</body>
</html>
